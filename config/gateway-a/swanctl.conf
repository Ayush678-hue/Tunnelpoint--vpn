# TunnelPoint Production VICI Configuration File for Gateway A (New York - PART 15)
# Target File: /etc/swanctl/swanctl.conf or /config/gateway-a/swanctl.conf
# Enforces IKEv2, AES-256-GCM-16, SHA-384, ECDH P-384 (Curve25519), Perfect Forward Secrecy, and DPD

connections {
    # Define connection block named 'tunnelpoint-s2s'
    tunnelpoint-s2s {
        # Enforce IKE version 2 strictly (No legacy IKEv1 fallback allowed!)
        version = 2

        # Local public WAN interface IP address of Gateway A
        local_addrs  = 203.0.113.10

        # Remote public WAN interface IP address of Gateway B (London)
        remote_addrs = 198.51.100.20

        # Enforce UDP Port 4500 encapsulation if NAT is detected during IKE_SA_INIT
        encap = yes

        # Send certificate request payloads during handshake to assist peer in selecting certificate
        send_certreq = yes

        # Enable MOBIKE (RFC 4555) for roaming WAN IP resilience
        mobike = no

        # ==========================================
        # PHASE 1 (IKE_SA) CRYPTOGRAPHIC PROPOSALS
        # ==========================================
        # aes256gcm16: 256-bit AES in Galois/Counter Mode with 16-byte authentication tag
        # prfsha384: SHA-384 Pseudo-Random Function for key derivation
        # ecp384: 384-bit Elliptic Curve Diffie-Hellman (DH Group 20) for asymmetric key exchange!
        # The exclamation mark (!) strictly forbids falling back to weaker ciphers!
        proposals = aes256gcm16-prfsha384-ecp384!

        # Phase 1 rekeying timer: Re-negotiate control channel every 4 hours
        rekey_time = 4h
        reauth_time = 0

        # ==========================================
        # DEAD PEER DETECTION (DPD / RFC 3706)
        # ==========================================
        # Send R-U-THERE informational keepalive packets every 30 seconds
        dpd_delay = 30s
        # If peer fails to respond, tear down stale SAs and attempt immediate re-initiation!
        dpd_action = restart

        # ==========================================
        # LOCAL GATEWAY A AUTHENTICATION (NEW YORK)
        # ==========================================
        local {
            # Enforce X.509 Public Key Certificate authentication
            auth = pubkey
            # Point to Gateway A Leaf Certificate file loaded in /etc/swanctl/x509/
            certs = gateway-a.crt
            # Enforce exact Subject Alternative Name (SAN) identity matching
            id = gateway-a.tunnelpoint.io
        }

        # ==========================================
        # REMOTE GATEWAY B AUTHENTICATION (LONDON)
        # ==========================================
        remote {
            # Require peer to present an X.509 certificate signed by our trusted Intermediate CA!
            auth = pubkey
            # Require peer's certificate to match exact SAN identity
            id = gateway-b.tunnelpoint.io
        }

        # ==========================================
        # PHASE 2 (CHILD_SA / DATA PLANE) TUNNEL DEFINITION
        # ==========================================
        children {
            net-a-to-net-b {
                # Local Traffic Selector: New York Headquarters LAN subnet
                local_ts = 192.168.10.0/24

                # Remote Traffic Selector: London Branch Office LAN subnet
                remote_ts = 192.168.20.0/24

                # PHASE 2 CRYPTOGRAPHIC PROPOSALS & PERFECT FORWARD SECRECY (PFS)!
                # Notice we include 'ecp384' in the Phase 2 proposal! This forces a brand new ECDH key exchange
                # specifically for the data plane, guaranteeing 100% Perfect Forward Secrecy (PFS)!
                esp_proposals = aes256gcm16-ecp384!

                # Phase 2 rekeying timer: Re-negotiate AES data encryption keys every 1 hour (Make-Before-Break!)
                rekey_time = 1h

                # Action on startup: 'start' initiates tunnel immediately; 'trap' waits for outbound traffic to trigger tunnel
                start_action = start
                close_action = restart
                dpd_action = restart

                # Optional: Bind this CHILD_SA to a Linux Virtual Tunnel Interface (vti0 / XFRM interface)
                # set_mark_in = 100
                # set_mark_out = 100
            }
        }
    }
}

# ==========================================
# SECRET KEY & CERTIFICATE PATH DECLARATIONS
# ==========================================
secrets {
    # Load Gateway A private key from /etc/swanctl/private/ or local path
    private-gateway-a {
        file = gateway-a.key
    }
}
