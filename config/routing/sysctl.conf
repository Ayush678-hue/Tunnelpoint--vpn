# TunnelPoint Enterprise Sysctl Kernel Hardening Configuration (PART 16)
# Target File: /etc/sysctl.d/99-tunnelpoint-vpn.conf or /config/routing/sysctl.conf
# Enforces IP forwarding, Reverse Path Filtering (anti-spoofing), and TCP buffer scaling

# 1. Enable IPv4 and IPv6 Packet Forwarding across all network interfaces
# Mandatory! Without this, the Linux kernel drops all transit packets passing between LAN and WAN
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1

# 2. Disable ICMP Redirect Acceptance and Transmission
# Prevents attackers from diverting traffic away from our encrypted IPsec VPN tunnel
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0

# 3. Enable Strict Reverse Path Filtering (RP-Filter / RFC 3704)
# Drops inbound WAN packets claiming to originate from internal LAN IP addresses (IP Spoofing defense!)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# 4. Ignore ICMP Echo Broadcasts (Smurf DoS Attack Defense)
net.ipv4.icmp_echo_ignore_broadcasts = 1

# 5. Disable Source Routing (Prevents attackers from specifying custom routing hops across our gateway)
net.ipv4.conf.all.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0

# 6. Disable TCP Timestamps (Prevents uptime calculation and fingerprinting by remote scanners)
net.ipv4.tcp_timestamps = 0

# 7. Enable TCP SYN Cookies (SYN Flood DoS Attack Defense!)
# If SYN queue overflows under attack, kernel encodes SYN-ACK state into sequence number without allocating RAM!
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_max_syn_backlog = 4096

# 8. High-Throughput TCP Memory & Buffer Scaling for Multi-Gigabit VPN Routing
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.core.netdev_max_backlog = 10000
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# 9. Conntrack Table Scaling (Support up to 262,144 concurrent stateful flows in RAM)
net.netfilter.nf_conntrack_max = 262144
