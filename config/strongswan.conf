# TunnelPoint Master StrongSwan Daemon Configuration (PART 15)
# Configures charon logging, thread pools, VICI socket, and cryptographic plugin load order
# Target File: /etc/strongswan.conf or /config/strongswan.conf

charon {
    # Number of worker threads in charon thread pool (default 16, scaled for enterprise load)
    threads = 16

    # Send vendor ID payload indicating StrongSwan capabilities
    send_vendor_id = yes

    # Enforce strict X.509 certificate validation and revocation checking
    check_current_time = yes

    # Enable VICI (Versatile IKE Configuration Interface) socket for swanctl command-line control!
    plugins {
        vici {
            socket = unix:///var/run/charon.vici
        }
        
        # Enable kernel-netlink plugin to inject SAs and SPDs directly into Linux kernel XFRM engine!
        kernel-netlink {
            # Enforce route-based Virtual Tunnel Interfaces (VTI / XFRM interfaces)
            fwmark = yes
        }

        # Configure OpenSSL cryptographic plugin for hardware-accelerated AES-GCM and SHA-384
        openssl {
            fips_mode = 0
            engine_id = rdrand
        }
    }

    # ==========================================
    # ENTERPRISE LOGGING & DEBUGGING CONFIGURATION
    # ==========================================
    # Log levels: 0 = Silent, 1 = Error/Basic, 2 = Control Flow/Handshake, 3 = Raw Packet Dump
    filelog {
        /var/log/strongswan.log {
            time_format = %b %e %T
            default = 1
            # IKE control plane key exchange debugging (set to 2 to trace handshakes!)
            ike = 2
            # Configuration management debugging (VICI loading)
            cfg = 2
            # Network packet transmission/reception debugging
            net = 1
            # Cryptographic algorithm selection and encryption debugging
            enc = 1
            # X509 certificate and PKI chain verification debugging
            asn = 1
            # Kernel XFRM Netlink injection debugging
            knl = 2
            # Append to log file instead of overwriting
            append = no
            # Flush log buffer immediately after each write (essential for live tailing!)
            flush_line = yes
        }
    }

    syslog {
        daemon {
            default = 1
            ike = 2
            cfg = 2
        }
    }
}

# Include additional modular configuration snippets
include strongswan.d/*.conf
