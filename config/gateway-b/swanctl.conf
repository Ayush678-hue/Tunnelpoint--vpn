# TunnelPoint Production VICI Configuration File for Gateway B (London - PART 15)
# Target File: /etc/swanctl/swanctl.conf or /config/gateway-b/swanctl.conf
# Mirror configuration of Gateway A for London Branch Office

connections {
    tunnelpoint-s2s {
        version = 2

        # Local public WAN interface IP address of Gateway B (London)
        local_addrs  = 198.51.100.20

        # Remote public WAN interface IP address of Gateway A (New York)
        remote_addrs = 203.0.113.10

        encap = yes
        send_certreq = yes
        mobike = no

        # Phase 1 Cryptographic Proposals (AES-256-GCM / SHA-384 / ECDH P-384)
        proposals = aes256gcm16-prfsha384-ecp384!

        rekey_time = 4h
        reauth_time = 0
        dpd_delay = 30s
        dpd_action = restart

        # ==========================================
        # LOCAL GATEWAY B AUTHENTICATION (LONDON)
        # ==========================================
        local {
            auth = pubkey
            certs = gateway-b.crt
            id = gateway-b.tunnelpoint.io
        }

        # ==========================================
        # REMOTE GATEWAY A AUTHENTICATION (NEW YORK)
        # ==========================================
        remote {
            auth = pubkey
            id = gateway-a.tunnelpoint.io
        }

        # ==========================================
        # PHASE 2 (CHILD_SA / DATA PLANE) TUNNEL DEFINITION
        # ==========================================
        children {
            net-b-to-net-a {
                # Local Traffic Selector: London Branch Office LAN subnet
                local_ts = 192.168.20.0/24

                # Remote Traffic Selector: New York Headquarters LAN subnet
                remote_ts = 192.168.10.0/24

                # Enforce Perfect Forward Secrecy (PFS) via ECDH P-384
                esp_proposals = aes256gcm16-ecp384!

                rekey_time = 1h
                start_action = start
                close_action = restart
                dpd_action = restart
            }
        }
    }
}

secrets {
    private-gateway-b {
        file = gateway-b.key
    }
}
