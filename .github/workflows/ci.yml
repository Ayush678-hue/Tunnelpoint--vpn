name: TunnelPoint Enterprise CI/CD Pipeline (PART 25)

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ==============================================================================
  # 1. STATIC CODE ANALYSIS, LINTING & TERRAFORM VALIDATION
  # ==========================================
  lint-and-validate:
    name: Static Analysis & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install ShellCheck & Lint Bash Scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          echo "===> Running ShellCheck across all Bash automation scripts..."
          shellcheck pki/scripts/*.sh scripts/*.sh config/routing/*.sh docker/scripts/*.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Validate AWS Terraform Blueprint
        run: |
          cd cloud/aws
          terraform init -backend=false
          terraform validate

      - name: Validate Azure Terraform Blueprint
        run: |
          cd cloud/azure
          terraform init -backend=false
          terraform validate

      - name: Validate JSON/YAML Syntax (Grafana & Docker Compose)
        run: |
          python3 -c "import json; json.load(open('monitoring/grafana/dashboards/vpn_dashboard.json'))"
          echo "Grafana JSON syntax valid!"

  # ==============================================================================
  # 2. DOCKER COMPOSE MULTI-NODE LAB INTEGRATION TEST
  # ==========================================
  docker-integration-test:
    name: 5-Node Lab Tunnel Verification
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate 3-Tier Enterprise PKI Certificates
        run: |
          chmod +x pki/scripts/generate_pki.sh
          sudo bash pki/scripts/generate_pki.sh

      - name: Build and Launch 5-Node Docker Simulation Lab
        run: |
          cd docker
          docker compose up -d --build
          echo "Waiting 15 seconds for containers and routing tables to converge..."
          sleep 15
          docker compose ps

      - name: Execute Automated End-to-End Tunnel Verification Suite
        run: |
          chmod +x docker/scripts/test_tunnel.sh
          sudo bash docker/scripts/test_tunnel.sh

      - name: Collect Container Logs on Failure
        if: failure()
        run: |
          cd docker
          docker compose logs --no-color > ../docker_failure_logs.txt
          cat ../docker_failure_logs.txt

      - name: Tear Down Simulation Lab
        if: always()
        run: |
          cd docker
          docker compose down -v
