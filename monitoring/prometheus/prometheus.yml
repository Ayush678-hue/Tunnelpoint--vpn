# TunnelPoint Prometheus Monitoring Configuration (PART 21)
# Target File: /monitoring/prometheus/prometheus.yml
# Scrapes Linux Node Exporter (:9100) and custom StrongSwan VICI Exporter (:9876)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'tunnelpoint-monitor'

scrape_configs:
  # ==========================================
  # 1. STRONGSWAN VICI IPSEC METRICS EXPORTER
  # ==========================================
  - job_name: 'strongswan_vpn'
    static_configs:
      - targets:
          - 'gateway-a.tunnelpoint.io:9876'
          - 'gateway-b.tunnelpoint.io:9876'
    metrics_path: /metrics
    scheme: http
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(:[0-9]+)?'
        replacement: '${1}'

  # ==========================================
  # 2. LINUX SYSTEM & NETWORK NODE EXPORTER
  # ==========================================
  - job_name: 'node_exporter'
    static_configs:
      - targets:
          - 'gateway-a.tunnelpoint.io:9100'
          - 'gateway-b.tunnelpoint.io:9100'
          - 'router.tunnelpoint.io:9100'
          - 'host-a.tunnelpoint.io:9100'
          - 'host-b.tunnelpoint.io:9100'
